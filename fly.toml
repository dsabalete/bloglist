app = "bloglist-rk2gnq-dawn-resonance-6647"
primary_region = "cdg"

[checks.status]
interval = "30s"
path = "/api/health"
port = 3_001
timeout = "5s"
type = "http"

[http_service]
auto_start_machines = true
auto_stop_machines = "suspend"
force_https = true
internal_port = 3_001
min_machines_running = 0
processes = [ "app" ]

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "512mb"