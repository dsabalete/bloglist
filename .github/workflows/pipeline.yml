name: Deployment pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  check_skip:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.skip.outputs.skip }}
    steps:
      - uses: actions/checkout@v5
      - name: Check for \#skip in commit messages
        id: skip
        run: |
          git fetch --prune --unshallow || true
          SKIP=false

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            RANGE="${{ github.event.before }}..${{ github.event.after }}"
          fi

          if git rev-parse --verify "${RANGE%%..*}" >/dev/null 2>&1 && git rev-parse --verify "${RANGE##*..}" >/dev/null 2>&1; then
            echo "Checking commit range: $RANGE"
            if git log --pretty=%B "$RANGE" | grep -iq "#skip"; then
              SKIP=true
            fi
          else
            echo "Revision range invalid or unavailable ($RANGE), checking latest commit only."
            if git log --pretty=%B -n 1 | grep -iq "#skip"; then
              SKIP=true
            fi
          fi

          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"

  install:
    needs: [check_skip]
    if: ${{ needs.check_skip.outputs.skip == 'false' || github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
      - name: Cache node_modules
        id: cache-nodes
        uses: actions/cache@v5
        with:
          path: |
            client/node_modules
            server/node_modules
          key: node-modules-${{ hashFiles('client/package-lock.json', 'server/package-lock.json') }}
      - name: Install client dependencies
        if: steps.cache-nodes.outputs.cache-hit != 'true'
        run: npm ci --prefix client
      - name: Install server dependencies
        if: steps.cache-nodes.outputs.cache-hit != 'true'
        run: npm ci --prefix server

  setup_and_test:
    needs: [install, check_skip]
    if: ${{ needs.check_skip.outputs.skip == 'false' || github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: |
            client/node_modules
            server/node_modules
          key: node-modules-${{ hashFiles('client/package-lock.json', 'server/package-lock.json') }}
      - name: Check style and run tests
        env:
          TEST_MONGODB_URI: mongodb://localhost:27017/bloglist-test
          JWT_SECRET: ci-test-secret-key-for-testing-purposes-only
        run: |
          npm run lint --prefix client
          npm run lint --prefix server
          npm test --prefix server

  build:
    needs: [install, check_skip]
    if: ${{ needs.check_skip.outputs.skip == 'false' || github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: |
            client/node_modules
            server/node_modules
          key: node-modules-${{ hashFiles('client/package-lock.json', 'server/package-lock.json') }}
      - name: Build client
        run: npm run build --prefix client

  e2e:
    needs: [setup_and_test, build, check_skip]
    if: ${{ needs.check_skip.outputs.skip == 'false' || github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: |
            client/node_modules
            server/node_modules
          key: node-modules-${{ hashFiles('client/package-lock.json', 'server/package-lock.json') }}
      - name: Run client tests
        run: npm test --prefix client
      - name: Run server tests
        env:
          TEST_MONGODB_URI: mongodb://localhost:27017/bloglist-test
          JWT_SECRET: ci-test-secret-key-for-testing-purposes-only
        run: npm test --prefix server

  deploy:
    needs: [setup_and_test, check_skip]
    if: |
      always() &&
      github.event_name == 'push' &&
      needs.check_skip.outputs.skip == 'false' &&
      needs.setup_and_test.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
        with:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Deploy app
        run: flyctl deploy --remote-only --wait-timeout 60 --dockerfile ./Dockerfile
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  tag_release:
    needs: [deploy]
    if: |
      always() &&
      github.event_name == 'push' &&
      needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Bump version and push tag
        uses: anothrNick/github-tag-action@4ed44965e0db8dab2b466a16da04aec3cc312fd8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch

